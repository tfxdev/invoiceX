{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Invoice</title>
    <link href="{% static '/css/bootstrap.min.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/create_invoice_a4.css' %}">
</head>
<body>
    <div class="invoice-sheet">
        <div class="invoice-header bg-white pt-3 border rounded mb-3">
            <h1><i class="fas fa-receipt me-2"></i>Create Invoice</h1>
        </div>

        <div class="row mb-4">
            <div class="col-8">
                <div>
                    <input type="radio" name="invoice_type" value="sale" id="sale_invoice" checked>
                    <label for="sale_invoice">Sale</label> &nbsp;
                    <input type="radio" name="invoice_type" value="purchase" id="purchase_invoice">
                    <label for="purchase_invoice">Purchase</label>
                </div>
                <br/>
                <label for="customer-select" class="form-label">Bill To</label>
                <select class="form-select" id="customer-select">
                    <option value="">Walk-in Customer</option>
                    {% for customer in customers %}
                    <option value="{{ customer.id }}">{{ customer.name }} - {{ customer.phone }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-4 text-end">
                <p class="mb-1"><strong>Date:</strong> {% now "Y-m-d" %}</p>
                <p class="mb-0"><strong>Invoice #:</strong> New</p>
            </div>
        </div>

        <table class="table table-bordered" id="invoice-items-table">
            <thead class="table-light">
                <tr>
                    <th style="width: 40%;">Product</th>
                    <th style="width: 15%;">Quantity</th>
                    <th style="width: 20%;">Price</th>
                    <th style="width: 20%;">Subtotal</th>
                    <th class="text-center" style="width: 5%;"></th>
                </tr>
            </thead>
            <tbody>
                <!-- JS will populate this -->
            </tbody>
        </table>

        <button class="btn btn-dark btn-sm" id="add-row-btn"><i class="fas fa-plus me-1"></i> Add Item</button>

        <div class="row justify-content-end mt-4">
            <div class="col-lg-6">
                <div class="summary-section">
                    <div class="row mb-2 align-items-center">
                        <div class="col-6"><label class="col-form-label text-end">Total:</label></div>
                        <div class="col-6"><p class="form-control-plaintext text-end mb-0" id="total-value">BDT 0.00</p></div>
                    </div>
                    <div class="row mb-2 align-items-center">
                        <div class="col-6"><label for="discount-percent" class="col-form-label text-end">Discount (%):</label></div>
                        <div class="col-6"><input type="number" id="discount-percent" class="form-control form-control-sm text-end" value="0" min="0"></div>
                    </div>
                    <div class="row mb-2 align-items-center">
                        <div class="col-6"><label class="col-form-label text-end">Payable:</label></div>
                        <div class="col-6"><p class="form-control-plaintext text-end mb-0" id="payable-value">BDT 0.00</p></div>
                    </div>
                    <div class="row mb-2 align-items-center">
                        <div class="col-6"><label for="paid-amount" class="col-form-label text-end">Paid Amount:</label></div>
                        <div class="col-6"><input type="number" id="paid-amount" class="form-control form-control-sm text-end" value="0" min="0"></div>
                    </div>
                    <div class="row pt-2 mt-2 align-items-center">
                        <div class="col-6"><label class="col-form-label text-end fw-bold">Due:</label></div>
                        <div class="col-6"><p class="form-control-plaintext text-end mb-0 fw-bold" id="due-amount">BDT 0.00</p></div>
                    </div>
                    <div class="row mt-2 align-items-center">
                        <div class="col-6"><label for="auth-signature" class="col-form-label text-end">Signature:</label></div>
                        <div class="col-6"><input type="text" id="auth-signature" class="form-control form-control-sm text-end"></div>
                    </div>
                    <div class="row mt-5">
                        <button id="save-invoice-btn" class="btn btn-success p-2"><i class="fas fa-save me-2"></i>Save & Print Invoice</button>
                    </div>
                </div>
            </div>
        </div>
        
        <hr class="mt-4">


    </div>

    <!-- Hidden template for a new row -->
    <template id="invoice-row-template">
        <tr>
            <td>
                <select class="form-control product-select">
                    <option value="">Select a Product</option>
                    {% for product in products %}
                    <option value="{{ product.id }}" data-price="{{ product.price }}">{{ product.name }}</option>
                    {% endfor %}
                </select>
            </td>
            <td><input type="number" class="form-control quantity" value="1" min="1"></td>
            <td><input type="number" class="form-control price" step="0.01"></td>
            <td class="subtotal text-end">BDT 0.00</td>
            <td class="text-center"><button class="btn btn-danger btn-sm delete-row-btn"><i class="fas fa-times"></i></button></td>
        </tr>
    </template>

    <script src="{% static 'js/invoice_a4.js' %}"></script>
</body>
</html>
