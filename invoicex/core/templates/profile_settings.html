{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Settings</title>
    <link href="{% static '/css/bootstrap.min.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/profile.css' %}">
</head>
<body>
    <div class="container">
        <div class="invoice-header bg-white pt-3 border border-top-0 rounded mb-3">
            <h1><i class="fas fa-receipt me-2"></i>Profile settings</h1>
        </div>
        <div class="border p-3 mt-4 bg-light rounded">
            <h3>Profile </h3>
            <p>
                Username: <b class="text-success">{{request.user.username}}</b> (private)
            </p>
            <form method="post">
                {% csrf_token %}
                {{company_profile_form}}
                {{user_account_form}}
                <input type="submit" class="btn btn-primary mt-3" value="Save">
            </form>
        </div>

</body>
</html>
